name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ielts_platform_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: ielts_platform_ci
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      # CI-only secrets — never real credentials, just enough to satisfy
      # envValidationSchema and pass the min-length checks in Joi.
      JWT_ACCESS_SECRET: ci_access_secret_at_least_32_characters_long
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_32_characters_long
      JWT_REFRESH_EXPIRES_IN_DAYS: 30
      CORS_ORIGIN: http://localhost:3000
      PORT: 4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint "src/**/*.ts"

      - name: Build
        run: npm run build

      - name: Run migrations against a real Postgres instance
        run: npm run migration:run

      - name: Boot the app and confirm it responds
        run: |
          node dist/main.js &
          APP_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4000/api/v1/reading/tests -o /dev/null -w "%{http_code}" | grep -q 401; then
              echo "App responded as expected (401 without auth)."
              kill $APP_PID
              exit 0
            fi
            sleep 1
          done
          echo "App did not respond in time."
          kill $APP_PID || true
          exit 1

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_MEDIA_BASE_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --max-warnings=0

      - name: Build
        run: npm run build
